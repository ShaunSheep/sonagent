<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>视频播放</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="player-body">
    <div class="player-container" id="playerContainer">
        <!-- 返回按钮 -->
        <div class="player-header" id="playerHeader">
            <button class="back-btn" onclick="goBack()">←</button>
            <span class="player-title" id="playerTitle">视频播放</span>
            <button class="favorite-btn" id="favoriteBtn" onclick="toggleFavorite()">🤍</button>
        </div>

        <!-- 视频播放器 -->
        <div class="video-wrapper" id="videoWrapper">
            <video id="videoPlayer" playsinline x-webkit-airplay="allow" webkit-playsinline="true"></video>
            
            <!-- 播放控制栏 -->
            <div class="video-controls" id="videoControls">
                <div class="play-pause-btn" id="playPauseBtn">▶</div>
            </div>
            
            <!-- 进度条 -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-buffered" id="progressBuffered"></div>
                    <div class="progress-current" id="progressCurrent"></div>
                    <div class="progress-handle" id="progressHandle"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">00:00</span>
                    <span>/</span>
                    <span id="totalTime">00:00</span>
                </div>
            </div>
            
            <!-- 手势提示 -->
            <div class="gesture-hint" id="gestureHint"></div>
        </div>

        <!-- 底部导航 -->
        <div class="player-footer">
            <button class="nav-btn" id="prevBtn" onclick="prevVideo()">◀ 上一个</button>
            <button class="nav-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
            <button class="nav-btn rotate-btn" onclick="toggleRotate()">🔄</button>
            <button class="nav-btn fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
            <button class="nav-btn" id="nextBtn" onclick="nextVideo()">下一个 ▶</button>
        </div>

        <!-- 视频指示器 -->
        <div class="video-indicators" id="videoIndicators"></div>
    </div>

    <script src="/js/player.js"></script>
</body>
</html>
